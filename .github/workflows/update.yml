name: Actualizar datos del torneo

# Cuándo se ejecuta:
on:
  schedule:
    # Cada 6 horas (00:00, 06:00, 12:00, 18:00 UTC = 21:00, 03:00, 09:00, 15:00 ARG)
    - cron: '0 */6 * * *'
  # También permite dispararlo manualmente desde la pestaña Actions de GitHub
  workflow_dispatch:
  # Y cada vez que se modifique el scraper, para validarlo
  push:
    paths:
      - 'scraper/**'
      - '.github/workflows/update.yml'

# Permisos necesarios para hacer commit al repo
permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'scraper/requirements.txt'

      - name: Instalar dependencias
        run: |
          pip install -r scraper/requirements.txt

      - name: Ejecutar scraper
        run: |
          cd scraper
          python scrape.py --verbose

      - name: Detectar cambios
        id: changes
        run: |
          if [[ -n "$(git status --porcelain data/torneo.js)" ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "✓ Hay cambios en los datos del torneo"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "ℹ Sin cambios — los datos del sitio están iguales que la última vez"
          fi

      - name: Commit y push de los cambios
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/torneo.js
          git commit -m "🔄 Actualizar datos del torneo ($(date -u +'%Y-%m-%d %H:%M UTC'))"
          git push
