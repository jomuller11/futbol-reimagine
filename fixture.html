<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fixture · Papi Fútbol San José Morón</title>
  <meta name="description" content="Fixture completo y resultados fecha por fecha del torneo Papi Fútbol San José Morón.">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Papi Fútbol San José Morón">
  <meta property="og:title" content="Fixture · Papi Fútbol San José Morón">
  <meta property="og:description" content="Fixture completo y resultados fecha por fecha del torneo.">
  <meta property="og:url" content="https://jomuller11.github.io/futbol-reimagine/fixture.html">
  <meta property="og:image" content="https://jomuller11.github.io/futbol-reimagine/logo.png">
  <meta property="og:locale" content="es_AR">
  <meta name="twitter:card" content="summary">
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="header">
    <div class="container header-inner">
      <a href="index.html" class="brand">
        <div class="brand-logo"></div>
        <div class="brand-text">
          <div class="brand-name">Papi Fútbol</div>
          <div class="brand-sub">Colegio Marista San José · Morón</div>
        </div>
      </a>
      <nav class="nav" id="nav">
        <a href="index.html" class="nav-primary">Inicio</a>
        <a href="fixture.html" class="active nav-primary">Fixture</a>
        <a href="equipos.html">Equipos</a>
        <a href="estadisticas.html" class="nav-primary">Estadísticas</a>
      </nav>
      <button class="mobile-toggle" onclick="document.getElementById('nav').classList.toggle('open')">☰</button>
    </div>
  </header>

  <main class="page">
    <div class="container">

      <div class="page-header">
        <h1 class="page-title">Fixture del torneo</h1>
        <p class="page-sub" id="fixture-sub"></p>
      </div>

      <div class="seg" id="fase-filter" style="max-width:400px;"></div>

      <div class="fecha-selector" id="fecha-selector"></div>

      <div class="seg" id="zona-filter"></div>

      <div id="fecha-content"></div>

    </div>
  </main>

  <footer class="footer">
    <div class="container footer-inner">
      <div class="footer-brand">
        <div class="brand-logo small"></div>
        <div>
          <div style="font-weight: 600; color: var(--text);">Papi Fútbol Morón</div>
          <div>Colegio Marista San José</div>
        </div>
      </div>
      <div class="footer-social">
        <a href="https://www.facebook.com/papifutbolmoron" title="Facebook">f</a>
      </div>
    </div>
  </footer>

  <script src="data/torneo.js"></script>
  <script src="js/site.js"></script>
  <script>
    const selector = document.getElementById('fecha-selector');
    const faseFilter = document.getElementById('fase-filter');
    const zonaFilter = document.getElementById('zona-filter');

    // Fase por defecto: la actual (última). Se recuerda la elección.
    const faseActualNum = Math.max(...FIXTURE.map(f => f.fase));
    let faseActiva = parseInt(localStorage.getItem('fixtureFase')) || faseActualNum;
    if (!FASES.some(f => f.id === faseActiva)) faseActiva = faseActualNum;
    let zonaActiva = 'todas';   // 'todas' o una zona de la fase
    let fechaActiva = null;     // fecha global activa

    function faseDe(id) { return FASES.find(f => f.id === id); }
    function fechasDeFase(id) { return FIXTURE.filter(f => f.fase === id); }

    // Fila de partido: ganador en negrita, perdedor atenuado, hora si está pendiente.
    function renderMatchRow(p, fechaNum) {
      const jugada = (p.golesL !== undefined && p.golesV !== undefined);
      const winL = jugada && p.golesL > p.golesV;
      const winV = jugada && p.golesV > p.golesL;
      const mi = getMiEquipo();
      const esMio = mi && (p.local === mi || p.visitante === mi);
      const center = jugada
        ? `<span class="mscore"><span class="${winV ? 'lose' : ''}">${p.golesL}</span>–<span class="${winL ? 'lose' : ''}">${p.golesV}</span></span>`
        : `<span class="mscore muted">${p.hora || 'VS'}</span>`;
      return `
        <a href="ficha.html?fecha=${fechaNum}&local=${p.local}" class="match-row ${esMio ? 'mine' : ''}">
          <span class="side">${teamAvatar(p.local, 30)}<b class="${winV ? 'lose' : ''}">${getEquipoNombre(p.local)}${p.local === mi ? ' <span class="fav-star">★</span>' : ''}</b></span>
          ${center}
          <span class="side right"><span class="chevron">›</span>${teamAvatar(p.visitante, 30)}<b class="${winL ? 'lose' : ''}">${getEquipoNombre(p.visitante)}${p.visitante === mi ? ' <span class="fav-star">★</span>' : ''}</b></span>
        </a>
      `;
    }

    function renderZonaList(f, zonaKey) {
      const partidos = f.zonas[zonaKey] || [];
      if (!partidos.length) return '';
      return `
        <div class="match-list">
          <div class="match-list-head">
            <h3>${f.estado === 'jugada' ? 'Resultados' : 'Partidos'}</h3>
            <span class="zona-pill">Zona ${zonaKey}</span>
          </div>
          ${partidos.map(p => renderMatchRow(p, f.fecha)).join('')}
        </div>
      `;
    }

    function renderFecha(fechaGlobal) {
      const f = FIXTURE.find(x => x.fecha === fechaGlobal);
      if (!f) return;
      const estadoBadge = f.estado === 'jugada'
        ? '<span class="badge badge-success">Jugada</span>'
        : '<span class="badge badge-warning">Pendiente</span>';
      const zonasFase = faseDe(f.fase).zonas;
      const zonas = zonaActiva === 'todas' ? zonasFase : [zonaActiva];
      document.getElementById('fecha-content').innerHTML = `
        <div style="display:flex; align-items:center; gap:12px; margin-bottom:16px; flex-wrap:wrap;">
          <h2 style="font-size: 22px; font-weight: 700;">Fecha ${f.faseFecha}</h2>
          <span style="color: var(--text-secondary); font-size: 14px;">Fase ${f.fase} · ${f.fechaTexto}</span>
          ${estadoBadge}
        </div>
        ${zonas.map(z => renderZonaList(f, z)).join('')}
      `;
    }

    function renderChips() {
      const fechas = fechasDeFase(faseActiva);
      selector.innerHTML = fechas.map(f => `
        <button class="fecha-btn ${f.fecha===fechaActiva?'active':''}" data-fecha="${f.fecha}">
          ${f.fecha===fechaActiva ? 'Fecha ' + f.faseFecha : 'F' + f.faseFecha}
          <small>${f.fechaTexto.substring(0, 5)}</small>
        </button>
      `).join('');
    }

    function renderZonaFilter() {
      const zonas = faseDe(faseActiva).zonas;
      zonaFilter.innerHTML =
        `<button data-zona="todas" class="${zonaActiva==='todas'?'on':''}">Todas</button>` +
        zonas.map(z => `<button data-zona="${z}" class="${zonaActiva===z?'on':''}">Zona ${z}</button>`).join('');
    }

    // Elegir la fecha activa dentro de la fase: la última jugada, o la primera pendiente
    function fechaInicialDeFase(id) {
      const fechas = fechasDeFase(id);
      const jugadas = fechas.filter(f => f.estado === 'jugada');
      if (jugadas.length) return jugadas[jugadas.length - 1].fecha;
      return fechas.length ? fechas[0].fecha : null;
    }

    function switchFase(id) {
      faseActiva = id;
      localStorage.setItem('fixtureFase', id);
      zonaActiva = 'todas';
      fechaActiva = fechaInicialDeFase(id);
      document.getElementById('fixture-sub').textContent =
        `${faseDe(id).label} · ${faseDe(id).sub} · ${fechasDeFase(id).length} fechas`;
      faseFilter.querySelectorAll('button').forEach(b =>
        b.classList.toggle('on', parseInt(b.dataset.fase) === id));
      renderZonaFilter();
      renderChips();
      renderFecha(fechaActiva);
      centrarChip('instant');
    }

    function centrarChip(behavior) {
      const activeBtn = selector.querySelector('.fecha-btn.active');
      if (activeBtn) activeBtn.scrollIntoView({inline:'center', block:'nearest', behavior: behavior||'smooth'});
    }

    // Toggle de fase
    faseFilter.innerHTML = FASES.map(f =>
      `<button data-fase="${f.id}" class="${f.id===faseActiva?'on':''}">${f.label} <span style="opacity:.6; font-weight:400;">· ${f.sub}</span></button>`
    ).join('');
    faseFilter.addEventListener('click', e => {
      const b = e.target.closest('button'); if (!b) return;
      switchFase(parseInt(b.dataset.fase));
    });

    // Click en chip de fecha
    selector.addEventListener('click', e => {
      const btn = e.target.closest('.fecha-btn'); if (!btn) return;
      fechaActiva = parseInt(btn.dataset.fecha);
      renderChips();
      renderFecha(fechaActiva);
      centrarChip('smooth');
    });

    // Click en filtro de zona
    zonaFilter.addEventListener('click', e => {
      const b = e.target.closest('button'); if (!b) return;
      zonaActiva = b.dataset.zona;
      renderZonaFilter();
      renderFecha(fechaActiva);
    });

    switchFase(faseActiva);
    renderTabBar('fixture');
  </script>

</body>
</html>
