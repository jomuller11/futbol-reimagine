<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fixture · Papi Fútbol San José Morón</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="header">
    <div class="container header-inner">
      <a href="index.html" class="brand">
        <div class="brand-logo"></div>
        <div class="brand-text">
          <div class="brand-name">Papi Fútbol</div>
          <div class="brand-sub">Colegio Marista San José · Morón</div>
        </div>
      </a>
      <nav class="nav" id="nav">
        <a href="index.html">Inicio</a>
        <a href="fixture.html" class="active">Fixture</a>
        <a href="equipos.html">Equipos</a>
        <a href="estadisticas.html">Estadísticas</a>
        <a href="#">Noticias</a>
        <a href="#">Inscripción</a>
      </nav>
      <button class="mobile-toggle" onclick="document.getElementById('nav').classList.toggle('open')">☰</button>
    </div>
  </header>

  <main class="page">
    <div class="container">

      <div class="page-header">
        <h1 class="page-title">Fixture del torneo</h1>
        <p class="page-sub">Primera fase · 11 fechas · 24 equipos · 2 zonas</p>
      </div>

      <!-- Filtro jugada / pendiente -->
      <div class="fixture-filter" id="fixture-filter">
        <button class="fixture-filter-btn active" data-filter="all">Todas las fechas</button>
        <button class="fixture-filter-btn" data-filter="jugada">Resultados</button>
        <button class="fixture-filter-btn" data-filter="pendiente">Próximas</button>
      </div>

      <div id="fixture-all"></div>

    </div>
  </main>

  <footer class="footer">
    <div class="container footer-inner">
      <div class="footer-brand">
        <div class="brand-logo small"></div>
        <div>
          <div style="font-weight: 600; color: var(--text);">Papi Fútbol Morón</div>
          <div>Colegio Marista San José</div>
        </div>
      </div>
      <div class="footer-social">
        <a href="https://www.facebook.com/papifutbolmoron" title="Facebook">f</a>
        <a href="#" title="Instagram">ig</a>
        <a href="#" title="WhatsApp">wa</a>
      </div>
    </div>
  </footer>

  <script src="data/torneo.js"></script>
  <script>
    function renderMatchCard(p, zona, fechaNum) {
      const jugada = (p.golesL !== undefined && p.golesV !== undefined);
      const isWinnerL = jugada && p.golesL > p.golesV;
      const isWinnerV = jugada && p.golesV > p.golesL;
      const clsL = jugada ? (isWinnerL ? 'winner' : (isWinnerV ? 'loser' : '')) : '';
      const clsV = jugada ? (isWinnerV ? 'winner' : (isWinnerL ? 'loser' : '')) : '';
      const center = jugada
        ? `<span class="match-score">${p.golesL} - ${p.golesV}</span>`
        : `<span class="match-vs">VS</span>`;
      const canchaInfo = (p.cancha && p.turno) ? `Cancha ${p.cancha} · ${p.turno}` : (jugada ? '' : 'Por confirmar');
      return `
        <a href="ficha.html?fecha=${fechaNum}&local=${p.local}" class="match-card">
          <div class="match-head">
            <span class="match-zone ${zona===2?'zona-2':''}">Zona ${zona}</span>
            <span>${canchaInfo}</span>
          </div>
          <div class="match-body">
            <div class="match-team home ${clsL}">
              ${teamAvatar(p.local, 32)}
              <span class="team-name">${getEquipoNombre(p.local)}</span>
            </div>
            ${center}
            <div class="match-team away ${clsV}">
              <span class="team-name">${getEquipoNombre(p.visitante)}</span>
              ${teamAvatar(p.visitante, 32)}
            </div>
          </div>
        </a>
      `;
    }

    function renderAll(filter) {
      const fechas = filter === 'all'
        ? FIXTURE
        : FIXTURE.filter(f => f.estado === filter);

      if (fechas.length === 0) {
        document.getElementById('fixture-all').innerHTML =
          '<p style="color:var(--text-secondary); text-align:center; padding:40px 0;">No hay fechas para mostrar.</p>';
        return;
      }

      document.getElementById('fixture-all').innerHTML = fechas.map(f => {
        const esJugada = f.estado === 'jugada';
        const badge = esJugada
          ? '<span class="badge badge-success">Jugada</span>'
          : '<span class="badge badge-warning">Próxima</span>';

        return `
          <div class="fixture-fecha" id="fecha-${f.fecha}">
            <div class="fixture-fecha-head">
              <div style="display:flex; align-items:center; gap:10px;">
                <span class="fixture-fecha-num">Fecha ${f.fecha}</span>
                <span class="fixture-fecha-dia">${f.fechaTexto}</span>
                ${badge}
              </div>
            </div>

            <div class="fixture-zona-bloque">
              <div class="fixture-zona-label zona-1-label">Zona 1</div>
              <div class="match-grid">
                ${f.zona1.map(p => renderMatchCard(p, 1, f.fecha)).join('')}
              </div>
            </div>

            <div class="fixture-zona-bloque">
              <div class="fixture-zona-label zona-2-label">Zona 2</div>
              <div class="match-grid">
                ${f.zona2.map(p => renderMatchCard(p, 2, f.fecha)).join('')}
              </div>
            </div>
          </div>
        `;
      }).join('');

      // Scroll automático a la próxima fecha al cargar "todas"
      if (filter === 'all') {
        const proxima = FIXTURE.find(f => f.estado === 'pendiente');
        if (proxima) {
          setTimeout(() => {
            const el = document.getElementById(`fecha-${proxima.fecha}`);
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
          }, 200);
        }
      }
    }

    // Filtro
    document.getElementById('fixture-filter').addEventListener('click', e => {
      const btn = e.target.closest('.fixture-filter-btn');
      if (!btn) return;
      document.querySelectorAll('.fixture-filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderAll(btn.dataset.filter);
    });

    renderAll('all');
  </script>

</body>
</html>
